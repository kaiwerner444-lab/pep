[build]
  command = "cd pep-center-from-user/pep-center && npm install --legacy-peer-deps && npm run build"
  publish = "pep-center-from-user/pep-center/dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY"

[[redirects]]
  from = "/tasks.html"
  to = "/tasks.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
