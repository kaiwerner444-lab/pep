<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <defs>
    <!-- Glass gradient -->
    <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="20%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="80%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    
    <!-- Liquid gradient - Copper/Bronze -->
    <linearGradient id="liquid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="30%" stop-color="#b87333"/>
      <stop offset="50%" stop-color="#cd7f32"/>
      <stop offset="70%" stop-color="#b87333"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    
    <!-- Cap gradient - Metallic silver -->
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="25%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#8a8a8a"/>
      <stop offset="75%" stop-color="#6a6a6a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(184,115,51,0.4)"/>
      <stop offset="100%" stop-color="rgba(184,115,51,0)"/>
    </radialGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    
    <!-- Inner glow -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="-1" k3="1"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="200" cy="450" rx="150" ry="150" fill="url(#glow)"/>
  
  <!-- Vial shadow -->
  <ellipse cx="200" cy="520" rx="80" ry="15" fill="rgba(0,0,0,0.4)"/>
  
  <!-- Vial body -->
  <rect x="120" y="200" width="160" height="300" rx="10" fill="url(#glassBody)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Liquid inside -->
  <path d="M125 350 Q200 345 275 350 L275 490 Q275 495 270 495 L130 495 Q125 495 125 490 Z" fill="url(#liquid)" opacity="0.9"/>
  
  <!-- Liquid surface -->
  <ellipse cx="200" cy="350" rx="75" ry="8" fill="#cd7f32" opacity="0.8"/>
  
  <!-- Vial neck -->
  <rect x="150" y="160" width="100" height="40" fill="url(#glassBody)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Cap -->
  <rect x="145" y="130" width="110" height="35" rx="3" fill="url(#cap)"/>
  <rect x="145" y="130" width="110" height="5" rx="2" fill="#9a9a9a"/>
  
  <!-- Cap ridges -->
  <line x1="160" y1="135" x2="160" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="175" y1="135" x2="175" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="190" y1="135" x2="190" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="205" y1="135" x2="205" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="220" y1="135" x2="220" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="235" y1="135" x2="235" y2="160" stroke="#3a3a3a" stroke-width="1"/>
  
  <!-- Glass highlights -->
  <path d="M130 210 L130 480 Q130 485 135 485" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none"/>
  <path d="M140 210 L140 300" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  <path d="M270 210 L270 480 Q270 485 265 485" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
  
  <!-- Top reflection -->
  <ellipse cx="200" cy="165" rx="45" ry="5" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Label area -->
  <rect x="140" y="280" width="120" height="80" rx="2" fill="rgba(20,20,20,0.9)" stroke="rgba(184,115,51,0.3)" stroke-width="1"/>
  <line x1="155" y1="305" x2="245" y2="305" stroke="rgba(184,115,51,0.5)" stroke-width="1"/>
  <line x1="155" y1="325" x2="220" y2="325" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="155" y1="335" x2="200" y2="335" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Purity badge on label -->
  <circle cx="230" cy="345" r="12" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <text x="230" y="348" text-anchor="middle" fill="#b87333" font-size="8" font-family="sans-serif" font-weight="bold">99%</text>
</svg>