<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" fill="none">
  <!-- Vial body -->
  <rect x="25" y="60" width="50" height="120" rx="5" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
  <!-- Vial neck -->
  <rect x="35" y="40" width="30" height="20" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
  <!-- Vial cap -->
  <rect x="30" y="20" width="40" height="25" rx="3" fill="#f97316"/>
  <!-- Rubber stopper -->
  <rect x="37" y="42" width="26" height="6" fill="#374151"/>
  <!-- Label area -->
  <rect x="28" y="80" width="44" height="60" fill="#0a0a0a" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <!-- Liquid line -->
  <rect x="27" y="120" width="46" height="58" rx="3" fill="#f97316" opacity="0.3"/>
  <!-- Measurement lines -->
  <line x1="35" y1="100" x2="45" y2="100" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="110" x2="45" y2="110" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="130" x2="45" y2="130" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="140" x2="45" y2="140" stroke="#f97316" stroke-width="1" opacity="0.5"/>
</svg>